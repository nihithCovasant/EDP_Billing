[project]
name = "edpb-core"
version = "0.1.0"
description = "Shared EDPB contract: segments, dates, correlation ids, manifest schema, CBOS v5 constants, and THE mock CBOS server - consumed by EDP_Billing, EDPBilling_FIle_Upload, and mofsl_file_download_rpa_bot"
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.21",
]

[project.optional-dependencies]
# The mock CBOS server (edpb_core.mock_cbos) needs a web stack; the contract
# modules deliberately don't.
mock = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "pydantic>=2.6",
    "python-multipart>=0.0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/edpb_core"]

[tool.hatch.build.targets.wheel.force-include]
"src/edpb_core/py.typed" = "edpb_core/py.typed"
