version: '3.8'

services:

  # Agent Application
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: langgraph-agent
    ports:
      - "9999:9999"
    environment:
      # Agent Configuration
      AGENT_NAME: ${AGENT_NAME:-My Custom Agent}
      AGENT_DESCRIPTION: ${AGENT_DESCRIPTION:-A customizable AI agent}
      HOST: 0.0.0.0
      PORT: 9999
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STREAMING_ENABLED: ${STREAMING_ENABLED:-true}

      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}






    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

