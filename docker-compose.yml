version: '3.8'

services:

  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: edp-billing-agent
    ports:
      - "8005:8005"
    # All runtime configuration — server (host/port/log level), LLM via the
    # LiteLLM gateway, CBOS connection, EDP wake loop, email alerts, CORS
    # origins, and the PostgreSQL connection string — comes from the mounted
    # agent_config.json (its agent_config.env / .secrets / .edp blocks). It is
    # the single source of truth, so NO environment variables are injected here
    # (the config->env bridge uses setdefault(), meaning any env var set here
    # would override the file). Override a single value per-deployment only by
    # adding an explicit `environment:` entry.
    #
    # The database is whatever agent_config.json ->
    # secrets.database.postgres.connection_string points at (currently the MOFSL
    # RDS instance), so this stack starts no local postgres container — the
    # container must be able to reach that database host.
    volumes:
      # Mounted to /app/config; docker-entrypoint.sh copies it to the internal
      # path (/app/src/config/agent_config.json) at startup — see inject_config().
      - ./src/config/agent_config.json:/app/config/agent_config.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen('http://localhost:%s/health/live' % os.getenv('PORT','8005'))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
